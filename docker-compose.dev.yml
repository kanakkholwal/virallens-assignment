# docker-compose.dev.yml — Development environment
# docker compose -f docker-compose.dev.yml up

services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-dev-data:/data/db
    # No auth in dev — keeps the URI simple

  server:
    image: oven/bun:1
    working_dir: /app
    # bun --watch replaces tsx watch — bun has native TS support + hot reload
    entrypoint: ["sh", "-c", "bun install && bun --watch src/index.ts"]
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
      - server_nm:/app/node_modules
    environment:
      NODE_ENV: development
      PORT: "8080"
      MONGO_URI: mongodb://mongo:27017/virallens
      JWT_SECRET: ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AI_MODEL: ${AI_MODEL:-liquid/lfm-2.5-1.2b-instruct:free}
    depends_on:
      - mongo

  client:
    image: oven/bun:1
    working_dir: /app
    entrypoint: ["sh", "-c", "bun install && bunx vite --host 0.0.0.0 --port 4173"]
    ports:
      - "4173:4173"
    volumes:
      - ./client:/app
      - client_nm:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - server

volumes:
  mongo-dev-data:
  server_nm:
  client_nm:

