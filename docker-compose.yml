
services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret

  server:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - MONGO_URI=mongodb://root:secret@mongo:27017/virallens?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN-http://localhost:4173}
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "4173:4173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - server

volumes:
  mongo-data:
